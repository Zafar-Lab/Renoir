name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch so we don't waste CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "Python ${{ matrix.python-version }} · ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false   # let all matrix jobs finish even if one fails
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12"]

    steps:
      # ------------------------------------------------------------------
      # 1. Check out the repository
      # ------------------------------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Set up Python
      # ------------------------------------------------------------------
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # ------------------------------------------------------------------
      # 3. Install Renoir and its test dependencies
      # ------------------------------------------------------------------
      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          # Install Renoir itself (editable so src changes are picked up)
          pip install -e ".[test]"

      # ------------------------------------------------------------------
      # 4. Run the unit tests (fast — excludes integration tests by default)
      # ------------------------------------------------------------------
      - name: Run unit tests
        run: |
          pytest tests/ \
            -m "not integration" \
            --tb=short \
            -v \
            --cov=Renoir \
            --cov-report=term-missing \
            --cov-report=xml

      # ------------------------------------------------------------------
      # 5. Upload coverage to Codecov (optional but recommended)
      # ------------------------------------------------------------------
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false   # don't fail CI if Codecov is down
          token: ${{ secrets.CODECOV_TOKEN }}

  # ------------------------------------------------------------------------
  # Integration tests — run only on push to main (too slow for every PR)
  # ------------------------------------------------------------------------
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install igraph leidenalg

      - name: Run integration tests
        run: |
          pytest tests/ \
            -m "integration" \
            --tb=short \
            -v

  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: pre-commit/action@v3.0.1
