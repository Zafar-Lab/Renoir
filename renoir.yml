name: renoir
# Renoir conda environment
# Converted from Dockerfile (Python 3.12.4, Ubuntu 22.04 base)
#
# Create the environment:
#   conda env create -f environment.yml
#
# Activate it:
#   conda activate renoir
#
# Install Renoir itself after activation (not on PyPI/conda-forge):
#   pip install .
#
# Note: cell2location must be installed separately into its own environment.
#   See https://cell2location.readthedocs.io/en/latest/installation.html

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # ── Python runtime ────────────────────────────────────────────────────────
  - python=3.12.4

  # ── Jupyter ───────────────────────────────────────────────────────────────
  - jupyterlab>=4.2.4
  - nbconvert                  # notebook conversion (unpinned; Dockerfile used latest)

  # ── Core scientific stack (all available on conda-forge) ──────────────────
  - numpy
  - scipy
  - pandas
  - scikit-learn=1.6.0

  # ── Single-cell / spatial analysis ───────────────────────────────────────
  - scanpy=1.10.4
  - squidpy=1.6.2
  - anndata                    # pulled in by scanpy; pinned here for explicitness

  # ── Clustering ────────────────────────────────────────────────────────────
  - hdbscan=0.8.40
  - leidenalg                  # required by scanpy for Leiden clustering
  - python-igraph              # required by leidenalg

  # ── Visualisation ─────────────────────────────────────────────────────────
  - plotly=5.24.1
  - distinctipy=1.3.4
  - matplotlib
  - seaborn

  # ── pip-only packages (not available on conda-forge) ─────────────────────
  - pip
  - pip:
      - harmonypy==0.0.10       # batch-correction helper; pip-only
      - dynamictreecut==0.1.1   # dynamic tree cutting for hierarchical clustering; pip-only
