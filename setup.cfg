[tool:pytest]
testpaths = tests
markers =
    integration: marks tests that require real data files on disk (deselect with -m 'not integration')

[tool:ruff]
line-length = 120

[tool.ruff.lint]
ignore = ["F403"]

[tool.ruff.lint.per-file-ignores]
"Renoir/__init__.py" = ["F403"]
"Renoir/downstream.py" = ["F841"]
"tests/test_renoir.py" = ["F401"]